<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinanceIQ – Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f1117;
      --bg-card:    #1a1d27;
      --border:     rgba(255,255,255,0.08);
      --text:       #e2e5f0;
      --text-sub:   #8b90a7;
      --accent:     #22d3a2;
      --accent-dim: rgba(34,211,162,0.12);
      --danger:     #f87171;
      --input-bg:   #12151e;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(34,211,162,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(99,102,241,0.06) 0%, transparent 60%);
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      margin-bottom: 32px;
    }
    .logo-icon { font-size: 2rem; }
    .logo-text { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; }
    .logo-accent { color: var(--accent); }

    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }

    .auth-tabs {
      display: flex;
      background: var(--input-bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: var(--text-sub);
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .auth-tab.active {
      background: var(--bg-card);
      color: var(--accent);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .auth-form { display: none; flex-direction: column; gap: 18px; }
    .auth-form.active { display: flex; }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-sub);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .form-group input {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--accent); }
    .form-group input::placeholder { color: var(--text-sub); }

    .btn-auth {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #0a1a14;
      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 4px;
    }
    .btn-auth:hover { opacity: 0.9; }
    .btn-auth:active { transform: scale(0.98); }
    .btn-auth:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      color: var(--danger);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.88rem;
      display: none;
    }
    .error-msg.show { display: block; }

    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.82rem;
      color: var(--text-sub);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-sub);
      font-size: 0.8rem;
      margin: 4px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="auth-container">
  <div class="logo">
    <span class="logo-icon">💰</span>
    <span class="logo-text">Finance<span class="logo-accent">IQ</span></span>
  </div>

  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- LOGIN -->
    <form class="auth-form active" id="loginForm">
      <div id="loginError" class="error-msg"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-auth" id="loginBtn">Sign In</button>
    </form>

    <!-- SIGNUP -->
    <form class="auth-form" id="signupForm">
      <div id="signupError" class="error-msg"></div>
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="signupName" placeholder="e.g. Ravi Kumar" required autocomplete="name" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Min. 6 characters" required minlength="6" autocomplete="new-password" />
      </div>
      <button type="submit" class="btn-auth" id="signupBtn">Create Account</button>
    </form>

    <div class="auth-footer">
      Your financial data is private &amp; encrypted 🔒
    </div>
  </div>
</div>

<script>
  // ── Config ──
  const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
    ? 'http://localhost:3001'
    : 'https://YOUR-RENDER-APP.onrender.com'; // ← Update this after deploying backend

  // Redirect if already logged in
  if (localStorage.getItem('fiq_token')) {
    window.location.href = 'index.html';
  }

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
    });
    document.getElementById('loginForm').classList.toggle('active', tab === 'login');
    document.getElementById('signupForm').classList.toggle('active', tab === 'signup');
    document.getElementById('loginError').classList.remove('show');
    document.getElementById('signupError').classList.remove('show');
  }

  function setLoading(btn, loading) {
    btn.disabled = loading;
    btn.innerHTML = loading
      ? '<span class="spinner"></span>Please wait…'
      : btn.dataset.label;
  }

  document.getElementById('loginBtn').dataset.label = 'Sign In';
  document.getElementById('signupBtn').dataset.label = 'Create Account';

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('loginError');
    errEl.classList.remove('show');
    setLoading(btn, true);

    try {
      const res = await fetch(`${API}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('loginEmail').value,
          password: document.getElementById('loginPassword').value
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Login failed');

      localStorage.setItem('fiq_token', data.session.access_token);
      localStorage.setItem('fiq_user', JSON.stringify(data.user));
      window.location.href = 'index.html';
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.add('show');
      setLoading(btn, false);
    }
  });

  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('signupBtn');
    const errEl = document.getElementById('signupError');
    errEl.classList.remove('show');
    setLoading(btn, true);

    try {
      const res = await fetch(`${API}/api/auth/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('signupName').value,
          email: document.getElementById('signupEmail').value,
          password: document.getElementById('signupPassword').value
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Signup failed');

      if (data.session) {
        localStorage.setItem('fiq_token', data.session.access_token);
        localStorage.setItem('fiq_user', JSON.stringify(data.user));
        window.location.href = 'index.html';
      } else {
        // Email confirmation required
        document.getElementById('signupForm').innerHTML = `
          <div style="text-align:center;padding:20px 0">
            <div style="font-size:2.5rem;margin-bottom:12px">📬</div>
            <div style="font-weight:700;font-size:1.05rem;margin-bottom:8px">Check your email!</div>
            <div style="color:var(--text-sub);font-size:0.9rem">We sent a confirmation link to <strong style="color:var(--text)">${document.getElementById('signupEmail').value}</strong>. Click it to activate your account.</div>
          </div>`;
      }
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.add('show');
      setLoading(btn, false);
    }
  });
</script>
</body>
</html>
